        title: "ARKAD: Inventory Management System"
        quote: >
          A full-stack B2B e-commerce platform with secure workflows and intelligent forecasting.
        description: |
          - Built a full-stack MERN-based B2B e-commerce platform with dedicated admin and customer portals. 
          - Implemented secure quote-to-order workflows, including payment verification, QR-based tracking, and role-based access control (RBAC). 
          - Integrated QuickBooks for financial management and developed an AI-based forecasting system to support inventory and business decision-making.

      - layout: top-middle
