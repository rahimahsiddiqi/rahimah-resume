      - layout: top-middle
        title: Global COVID-19 Data Analysis
        quote: >
          A data-driven analysis project focused on predicting COVID-19 trends using machine learning.
        description: |
          - Performed comprehensive data analysis on global COVID-19 datasets using OWID data. 
          - Implemented regression models with feature engineering and hyperparameter tuning to evaluate mortality and case prediction performance. 
          - Visualized trends using advanced data visualization techniques.
          

      - layout: top-middle
        title: Urdu News Article Classification
